<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส้มตำสมดี อร่อยดี</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="somtam.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-text">
                <h1>ส้มตำสมดี อร่อยดี</h1>
                <p>สั่งส้มตำ</p>
            </div>
            <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
        </div>
    </header>

    <div id="sideMenuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <nav id="sideMenu" class="side-menu">
        <div class="menu-header">
            <h2>หมวดหมู่เมนู</h2>
            <button class="close-btn" onclick="toggleMenu()">×</button>
        </div>
        <div class="menu-links">
            <button class="menu-link active" onclick="showTab('lao', event); toggleMenu();">เหลา</button>
            <button class="menu-link" onclick="showTab('tum', event); toggleMenu();">ตำ</button>
            <button class="menu-link" onclick="showTab('season', event); toggleMenu();">ตามฤดูกาล</button>
            <button class="menu-link" onclick="showTab('topping', event); toggleMenu();">ท็อปปิ้ง</button>
        </div>
    </nav>
    
    <div class="container">
        <div id="lao" class="menu-section active"></div>
        <div id="tum" class="menu-section"></div>
        <div id="season" class="menu-section"></div>
        <div id="topping" class="menu-section"></div>

        <div class="cart">
            <h2>🛒 สรุปรายการอาหาร</h2>
            <pre id="orderSummary">ไม่พบสินค้าในตะกร้า</pre>
            
            <div class="total-section">
                <h3>รวม: <span id="totalPrice">0.00</span> บาท</h3>
            </div>

            <div class="input-group">
                <input type="text" id="customerName" placeholder="ชื่อลูกค้า">
                <input type="text" id="orderNote" placeholder="หมายเหตุ (เช่น ไม่เผ็ด, หวานน้อย)">
            </div>

            <div class="payment-methods">
                <button class="pay-btn active" data-method="เงินสด" onclick="selectPayment(this)">เงินสด</button>
                <button class="pay-btn" data-method="พร้อมเพย์" onclick="selectPayment(this)">พร้อมเพย์</button>
            </div>

            <div id="promptpaySection" style="display: none; text-align: center; margin-top: 20px;">
                <img id="promptpayQR" src="" alt="QR Code" style="max-width: 200px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px;">
                <div class="upload-slip-section">
                    <label for="slipUpload" class="upload-btn">📸 แนบสลิปโอนเงิน</label>
                    <input type="file" id="slipUpload" accept="image/*" style="display: none;" onchange="handleSlipUpload(event)">
                    <div id="slipName" class="slip-name-display"></div>
                </div>
            </div>

            <button id="checkoutBtn" class="checkout-btn" onclick="sendOrder()" disabled>กรุณาเลือกอาหาร</button>
            <div id="orderIdDisplay" class="order-id-display"></div>
        </div>
    </div>

    <div id="queuePopup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <h2>🎉 สั่งอาหารสำเร็จ!</h2>
            <p>หมายเลขคิวของคุณคือ</p>
            <div id="popupQueueNumber" class="queue-number">0</div>
            <button onclick="closeQueuePopup()">ตกลง</button>
        </div>
    </div>

    <script src="somtam.js"></script>
</body>
</html>
